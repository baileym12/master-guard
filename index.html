<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Master Guard Live Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #050509;
      --card: rgba(255, 255, 255, 0.04);
      --card-strong: rgba(255, 255, 255, 0.08);
      --ink: #f7f8ff;
      --muted: #b6bdd7;
      --line: rgba(181, 191, 255, 0.22);
      --purple: #510b91;
      --violet: #6b2fd1;
      --blue: #3d2c9e;
      --danger: #ff507c;
      --warn: #8f6bff;
      --ok: #5cb6ff;
      --shine: #d9d2ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(81, 11, 145, 0.5), transparent 34%),
        radial-gradient(circle at 84% 14%, rgba(61, 44, 158, 0.48), transparent 31%),
        radial-gradient(circle at 60% 80%, rgba(107, 47, 209, 0.36), transparent 32%),
        linear-gradient(160deg, #020205 0%, #070712 46%, #0a0620 100%);
      padding: 1.3rem;
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      filter: blur(34px);
      opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
    }

    body::before {
      width: 28rem;
      height: 28rem;
      top: -10rem;
      right: -8rem;
      background: radial-gradient(circle, #510b91 0%, rgba(81, 11, 145, 0) 65%);
    }

    body::after {
      width: 30rem;
      height: 30rem;
      left: -10rem;
      bottom: -14rem;
      background: radial-gradient(circle, #3d2c9e 0%, rgba(61, 44, 158, 0) 65%);
      animation-duration: 15s;
    }

    @keyframes drift {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(18px, -14px, 0) scale(1.08);
      }
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      gap: 1rem;
      position: relative;
      z-index: 1;
    }

    .card {
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), rgba(255, 255, 255, 0.02)),
        var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 1rem 1.1rem;
      backdrop-filter: blur(8px);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 20px 45px rgba(2, 4, 12, 0.46);
    }

    h1 {
      margin: 0;
      font-size: clamp(1.35rem, 3.7vw, 2.4rem);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 700;
      background: linear-gradient(120deg, #ffffff 10%, #d8cbff 40%, #80adff 95%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 20px rgba(151, 119, 255, 0.26);
    }

    .meta {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .mono {
      font-family: "JetBrains Mono", monospace;
      font-size: 0.84rem;
      overflow-wrap: anywhere;
    }

    .events {
      display: grid;
      gap: 0.75rem;
    }

    .event {
      border: 1px solid rgba(176, 187, 255, 0.2);
      border-left: 4px solid rgba(176, 187, 255, 0.5);
      padding: 0.85rem;
      border-radius: 0.7rem;
      background:
        linear-gradient(130deg, rgba(107, 47, 209, 0.16), rgba(61, 44, 158, 0.14)),
        rgba(6, 8, 20, 0.72);
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.35);
      animation: fade-in 220ms ease-out;
    }

    .event.has-change {
      border-left-color: var(--danger);
      background:
        linear-gradient(132deg, rgba(81, 11, 145, 0.33), rgba(61, 44, 158, 0.2)),
        rgba(10, 8, 24, 0.8);
    }

    .event.start {
      border-left-color: var(--ok);
      background:
        linear-gradient(132deg, rgba(61, 44, 158, 0.33), rgba(81, 11, 145, 0.2)),
        rgba(7, 10, 24, 0.8);
    }

    .event time {
      display: block;
      color: var(--muted);
      margin-bottom: 0.35rem;
      font-size: 0.83rem;
    }

    .file-group {
      margin: 0.3rem 0;
    }

    .tag {
      display: inline-block;
      min-width: 1.6rem;
      text-align: center;
      border-radius: 0.4rem;
      padding: 0.05rem 0.3rem;
      margin-right: 0.4rem;
      color: white;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      border: 1px solid rgba(255, 255, 255, 0.24);
      box-shadow: 0 0 0 1px rgba(10, 14, 35, 0.4) inset;
    }

    .tag.m {
      background: linear-gradient(120deg, #6a47e6, #8f6bff);
    }

    .tag.a {
      background: linear-gradient(120deg, #3f82ff, #5cb6ff);
    }

    .tag.d {
      background: linear-gradient(120deg, #d93a77, #ff507c);
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(6px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      body {
        padding: 0.8rem;
      }

      .card {
        padding: 0.85rem;
      }

      .meta {
        font-size: 0.88rem;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Master Guard Live Dashboard</h1>
      <p class="meta">Polling <span id="event-file" class="mono"></span> every 2s</p>
      <p class="meta">Use <span class="mono">?file=/path/to/live-events.jsonl</span> to point at another event file.</p>
    </section>

    <section class="card">
      <div class="meta" id="status">Loading events...</div>
      <div class="events" id="events"></div>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const eventFile = params.get("file") || "live-events.jsonl";
    const eventFileNode = document.getElementById("event-file");
    const statusNode = document.getElementById("status");
    const eventsNode = document.getElementById("events");

    eventFileNode.textContent = eventFile;
    let lastSignature = "";

    function makeEventCard(event) {
      const card = document.createElement("article");
      const hasChange = (event.modified?.length || 0) + (event.added?.length || 0) + (event.deleted?.length || 0) > 0;
      card.className = `event ${hasChange ? "has-change" : ""} ${event.event === "monitor_started" ? "start" : ""}`;

      const when = document.createElement("time");
      when.className = "mono";
      when.textContent = event.created_at || "unknown time";
      card.appendChild(when);

      if (event.event === "monitor_started") {
        const line = document.createElement("div");
        line.textContent = "Monitor started";
        card.appendChild(line);

        const paths = document.createElement("div");
        paths.className = "mono";
        paths.textContent = `paths: ${(event.paths || []).join(", ")}`;
        card.appendChild(paths);
        return card;
      }

      const changed = document.createElement("div");
      changed.textContent = `${(event.modified || []).length + (event.added || []).length + (event.deleted || []).length} file(s) changed`;
      card.appendChild(changed);

      [
        ["M", "m", event.modified || []],
        ["A", "a", event.added || []],
        ["D", "d", event.deleted || []],
      ].forEach(([label, cls, paths]) => {
        if (!paths.length) {
          return;
        }
        paths.forEach((path) => {
          const row = document.createElement("div");
          row.className = "file-group mono";
          row.innerHTML = `<span class="tag ${cls}">${label}</span>${path}`;
          card.appendChild(row);
        });
      });

      if (event.report_dir) {
        const report = document.createElement("div");
        report.className = "mono";
        report.textContent = `report: ${event.report_dir}`;
        card.appendChild(report);
      }

      return card;
    }

    async function poll() {
      try {
        const response = await fetch(`${eventFile}?_=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const content = await response.text();
        const trimmed = content.trim();
        const signature = `${trimmed.length}:${trimmed.slice(-50)}`;
        if (signature === lastSignature) {
          statusNode.textContent = `Watching for changes (${new Date().toLocaleTimeString()})`;
          return;
        }

        lastSignature = signature;
        const lines = trimmed ? trimmed.split("\n") : [];
        const events = lines.map((line) => JSON.parse(line)).reverse();

        eventsNode.innerHTML = "";
        events.forEach((event) => eventsNode.appendChild(makeEventCard(event)));

        statusNode.textContent = `${events.length} event(s) loaded`;
      } catch (error) {
        statusNode.textContent = `Waiting for event file... (${error.message})`;
      }
    }

    poll();
    setInterval(poll, 2000);
  </script>
</body>
</html>
